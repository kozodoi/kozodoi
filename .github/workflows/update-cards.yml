name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate custom cards
        env:
          # use a PAT (repo + read:user scopes) for private repos and accurate
          # private commit counts; GITHUB_TOKEN works for public-only stats
          GH_TOKEN: ${{ secrets.GH_CARDS_TOKEN || secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          ORG: "aws-samples"
          INCLUDE_EXTRA: "" # force-add repos, e.g. "aws-samples/foo aws-samples/bar"
          EXCLUDE_REPOS: "" # drop repos, e.g. "aws-samples/tiny-typo-fix"
          LANGS_HIDE: "jupyter notebook,html"
          LANGS_COUNT: "4"
          OUT_DIR: "profile"
        run: python scripts/generate_cards.py

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
